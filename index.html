<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>App Học Từ Vựng AI - Pro</title>
  
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  
  <style>
    .pt-safe { padding-top: env(safe-area-inset-top); }
    .pb-safe { padding-bottom: env(safe-area-inset-bottom); }
    body { margin: 0; background-color: #0f172a; overscroll-behavior-y: none; }
  </style>

  <script type="importmap">
    {
      "imports": {
        "react": "https://esm.sh/react@18.2.0",
        "react-dom/client": "https://esm.sh/react-dom@18.2.0/client",
        "lucide-react": "https://esm.sh/lucide-react@0.292.0",
        "firebase/app": "https://esm.sh/firebase@10.8.0/app",
        "firebase/auth": "https://esm.sh/firebase@10.8.0/auth",
        "firebase/firestore": "https://esm.sh/firebase@10.8.0/firestore"
      }
    }
  </script>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel" data-type="module">
    import React, { useState, useEffect, useRef, useCallback, useMemo } from 'react';
    import { createRoot } from 'react-dom/client';
    import { Volume2, Mic, Plus, List, BookOpen, ChevronRight, ChevronLeft, Trash2, CheckCircle2, XCircle, AlertCircle, Wand2, Loader2, BrainCircuit, Trophy, RotateCcw, Cloud, CloudOff, User, LogOut, ShieldCheck, Tag, Key } from 'lucide-react';

    // --- Khởi tạo Firebase ---
    import { initializeApp } from 'firebase/app';
    import { getAuth, signInWithCustomToken, signInAnonymously, onAuthStateChanged, signOut } from 'firebase/auth';
    import { getFirestore, collection, doc, setDoc, deleteDoc, onSnapshot, query, orderBy } from 'firebase/firestore';

    // 👇 DÁN ĐOẠN MÃ CONFIG FIREBASE CỦA MÀY VÀO TRONG DẤU NGOẶC NHỌN NÀY 👇
    const firebaseConfig = {
      apiKey: "AIzaSyCXyQ49GSNwxMD8u2WaAJfERfi52RUap40",
      authDomain: "app-tu-vung-tieng-anh.firebaseapp.com",
      projectId: "app-tu-vung-tieng-anh",
      storageBucket: "app-tu-vung-tieng-anh.firebasestorage.app",
      messagingSenderId: "885639041090",
      appId: "1:885639041090:web:d7323795134bf9181fdddb",
      measurementId: "G-FJ796YMESH"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    // --- Dữ liệu mẫu ---
    const sampleVocabulary = [
      { word: 'Invest', context: 'Tài chính', phonetic: '/ɪnˈvɛst/', meaning: 'Đầu tư', example: 'I want to invest my money safely.' },
      { word: 'Asset', context: 'Tài chính', phonetic: '/ˈæsɛt/', meaning: 'Tài sản', example: 'A house is a good asset.' },
      { word: 'Pronunciation', context: 'Ngôn ngữ', phonetic: '/prəˌnʌnsiˈeɪʃən/', meaning: 'Cách phát âm', example: 'Your pronunciation is very clear.' },
      { word: 'Portfolio', context: 'Đầu tư', phonetic: '/pɔːtˈfəʊliəʊ/', meaning: 'Danh mục đầu tư', example: 'My portfolio has safe stocks.' },
      { word: 'Interest', context: 'Ngân hàng', phonetic: '/ˈɪntrɪst/', meaning: 'Lãi suất', example: 'This bank has good interest.' }
    ];

    // --- Utilities: Xử lý Âm thanh ---
    const audioUtils = {
      base64ToArrayBuffer: (base64) => {
        const binaryString = window.atob(base64);
        const bytes = new Uint8Array(binaryString.length);
        for (let i = 0; i < binaryString.length; i++) bytes[i] = binaryString.charCodeAt(i);
        return bytes.buffer;
      },
      pcmToWav: (pcmData, sampleRate) => {
        const numChannels = 1, bitsPerSample = 16;
        const byteRate = sampleRate * numChannels * (bitsPerSample / 8);
        const blockAlign = numChannels * (bitsPerSample / 8);
        const dataSize = pcmData.byteLength;
        const buffer = new ArrayBuffer(44 + dataSize);
        const view = new DataView(buffer);

        const writeString = (v, offset, str) => { for (let i = 0; i < str.length; i++) v.setUint8(offset + i, str.charCodeAt(i)); };

        writeString(view, 0, 'RIFF'); view.setUint32(4, 36 + dataSize, true);
        writeString(view, 8, 'WAVE'); writeString(view, 12, 'fmt ');
        view.setUint32(16, 16, true); view.setUint16(20, 1, true); 
        view.setUint16(22, numChannels, true); view.setUint32(24, sampleRate, true);
        view.setUint32(28, byteRate, true); view.setUint16(32, blockAlign, true);
        view.setUint16(34, bitsPerSample, true); writeString(view, 36, 'data');
        view.setUint32(40, dataSize, true);

        const pcmView = new Uint8Array(pcmData);
        for (let i = 0; i < pcmView.length; i++) view.setUint8(44 + i, pcmView[i]);

        return new Blob([view], { type: 'audio/wav' });
      }
    };

    // --- Utilities: API Helpers ---
    const aiHelpers = {
      getApiKey: () => {
        const key = localStorage.getItem('gemini_api_key');
        if (!key) throw new Error("NO_API_KEY");
        return key;
      },
      fetchWithRetry: async (url, payload, retries = 5, delay = 1000) => {
        for (let i = 0; i < retries; i++) {
          try {
            const res = await fetch(url, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload) });
            if (!res.ok) throw new Error(`HTTP error! status: ${res.status}`);
            return await res.json();
          } catch (e) {
            if (i === retries - 1) throw e;
            await new Promise(r => setTimeout(r, delay));
            delay *= 2;
          }
        }
      },
      generateText: async (prompt, isJson = false) => {
        const key = aiHelpers.getApiKey();
        const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${key}`;
        const payload = { contents: [{ parts: [{ text: prompt }] }] };
        if (isJson) {
          payload.generationConfig = { responseMimeType: "application/json" };
        }
        const data = await aiHelpers.fetchWithRetry(url, payload);
        return data.candidates?.[0]?.content?.parts?.[0]?.text;
      },
      generateAudio: async (text) => {
        const key = aiHelpers.getApiKey();
        const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-tts:generateContent?key=${key}`;
        const payload = {
          contents: [{ parts: [{ text }] }],
          generationConfig: { responseModalities: ["AUDIO"], speechConfig: { voiceConfig: { prebuiltVoiceConfig: { voiceName: "Kore" } } } },
          model: "gemini-2.5-flash-preview-tts"
        };
        const data = await aiHelpers.fetchWithRetry(url, payload);
        const inlineData = data?.candidates?.[0]?.content?.parts?.[0]?.inlineData;
        if (!inlineData) throw new Error("No audio data");
        
        const rateMatch = (inlineData.mimeType || "").match(/rate=(\d+)/);
        const sampleRate = rateMatch ? parseInt(rateMatch[1], 10) : 24000;
        const pcmBuffer = audioUtils.base64ToArrayBuffer(inlineData.data);
        return URL.createObjectURL(audioUtils.pcmToWav(pcmBuffer, sampleRate));
      }
    };

    // --- Component Tooltip Word ---
    const TooltipWord = React.memo(({ word, meaning }) => {
      const [show, setShow] = useState(false);
      const timerRef = useRef(null);

      const handleShow = () => {
        setShow(true);
        if (timerRef.current) clearTimeout(timerRef.current);
        timerRef.current = setTimeout(() => setShow(false), 2500); 
      };

      const handleHide = () => {
        setShow(false);
        if (timerRef.current) clearTimeout(timerRef.current);
      };

      return (
        <span 
          className="relative inline-block mx-0.5"
          onMouseEnter={handleShow} onMouseLeave={handleHide}
          onTouchStart={handleShow} onTouchEnd={handleHide} onTouchCancel={handleHide}
          onContextMenu={(e) => e.preventDefault()}
        >
          <strong className="text-rose-600 bg-rose-50 px-1.5 py-0.5 rounded-md border border-rose-200 cursor-pointer active:bg-rose-100 transition-colors select-none">
            {word}
          </strong>
          {show && (
            <span className="absolute bottom-full left-1/2 -translate-x-1/2 mb-2 px-3 py-1.5 bg-slate-800 text-white text-[13px] font-bold rounded-xl whitespace-nowrap z-50 shadow-xl pointer-events-none animate-in fade-in zoom-in-95 duration-200">
              {meaning}
              <svg className="absolute top-full left-1/2 -translate-x-1/2 w-3 h-3 text-slate-800" fill="currentColor" viewBox="0 0 8 8"><path d="M0 0l4 4 4-4z" /></svg>
            </span>
          )}
        </span>
      );
    });

    // --- MAIN APP COMPONENT ---
    function App() {
      const [activeTab, setActiveTab] = useState('study'); 
      const [user, setUser] = useState(null);
      const [words, setWords] = useState([]);
      const [loading, setLoading] = useState(true);
      const [syncStatus, setSyncStatus] = useState('connecting'); 

      useEffect(() => {
        document.body.style.overflow = 'hidden';
        document.body.style.overscrollBehaviorY = 'none';
        return () => { document.body.style.overflow = ''; document.body.style.overscrollBehaviorY = ''; };
      }, []);

      useEffect(() => {
        const initAuth = async () => {
          try {
            await signInAnonymously(auth);
          } catch (e) {
            console.error("Auth Error:", e);
            setSyncStatus('error'); setLoading(false);
          }
        };
        initAuth();
        const unsubscribe = onAuthStateChanged(auth, setUser);
        return () => unsubscribe();
      }, []);

      useEffect(() => {
        if (!user) { setLoading(false); return; }
        
        setLoading(true);
        // Khởi tạo Collection riêng cho user trong Firestore
        const q = query(collection(db, 'users', user.uid, 'vocabulary'), orderBy("createdAt", "desc"));
        let isResolved = false;

        const unsubscribe = onSnapshot(q, (snapshot) => {
          isResolved = true;
          const vocabList = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
          setWords(vocabList);
          setLoading(false);
          setSyncStatus('synced');
        }, (error) => {
          console.error("Firestore error:", error);
          setSyncStatus('error'); setLoading(false);
        });

        const timeout = setTimeout(() => {
          if (!isResolved) {
            setLoading(false); setSyncStatus('error');
          }
        }, 5000);

        return () => { unsubscribe(); clearTimeout(timeout); };
      }, [user]);

      const handleAddWordToDB = useCallback(async (wordData) => {
        if (!user) return;
        setSyncStatus('connecting'); 
        try {
          await setDoc(doc(collection(db, 'users', user.uid, 'vocabulary')), { ...wordData, createdAt: Date.now() });
        } catch (e) { console.error(e); setSyncStatus('error'); }
      }, [user]);

      const handleDeleteFromDB = useCallback(async (id) => {
        if (!user) return;
        try { await deleteDoc(doc(db, 'users', user.uid, 'vocabulary', id)); } 
        catch (e) { console.error(e); }
      }, [user]);

      const addSampleData = useCallback(async () => {
        if (!user) return;
        setLoading(true);
        for (const word of sampleVocabulary) await handleAddWordToDB(word);
        setLoading(false);
      }, [user, handleAddWordToDB]);

      const handleLogout = async () => {
        if (window.confirm("Đăng xuất sẽ xóa phiên đăng nhập hiện tại trên máy này. Tiếp tục?")) {
          await signOut(auth);
          window.location.reload();
        }
      };

      return (
        <div className="h-[100dvh] w-full bg-slate-900 flex justify-center">
          <div className="h-full w-full max-w-[430px] bg-slate-50 relative flex flex-col shadow-2xl overflow-hidden font-sans select-none">
            
            <header className="shrink-0 bg-indigo-600 text-white pt-safe pb-4 px-4 shadow-md z-20">
              <div className="flex items-center justify-between pt-4">
                <h1 className="text-xl font-bold flex items-center gap-2 tracking-tight">
                  <BookOpen size={24} /> VocabMaster AI
                </h1>
                <div className="flex items-center gap-1.5 text-[10px] font-bold bg-indigo-800/40 px-2.5 py-1.5 rounded-full backdrop-blur-sm">
                  {syncStatus === 'connecting' && <Loader2 size={14} className="animate-spin text-white" />}
                  {syncStatus === 'synced' && <><Cloud size={14} className="text-green-300" /> Đám mây</>}
                  {syncStatus === 'error' && <><CloudOff size={14} className="text-red-300" /> Lỗi Sync</>}
                </div>
              </div>
            </header>

            <main className="flex-1 overflow-y-auto w-full relative scroll-smooth pb-24 bg-slate-50">
              {loading ? (
                <div className="h-full flex flex-col items-center justify-center text-indigo-500 gap-3">
                  <Loader2 size={40} className="animate-spin" />
                  <p className="font-bold text-slate-500 animate-pulse">Đang kết nối dữ liệu...</p>
                </div>
              ) : (
                <div className="p-4 h-full">
                  {activeTab === 'study' && <StudyMode words={words} onAddSample={addSampleData} />}
                  {activeTab === 'quiz' && <QuizMode words={words} />}
                  {activeTab === 'manage' && <ManageMode words={words} onAdd={handleAddWordToDB} onDelete={handleDeleteFromDB} onAddSample={addSampleData} />}
                  {activeTab === 'profile' && <ProfileMode user={user} wordsCount={words.length} onLogout={handleLogout} />}
                </div>
              )}
            </main>

            <nav className="absolute bottom-0 w-full bg-white border-t border-slate-200 flex justify-around items-center h-[72px] pb-safe z-30 shadow-[0_-4px_20px_rgba(0,0,0,0.05)]">
              <MobileNavBtn active={activeTab === 'study'} onClick={() => setActiveTab('study')} icon={<BookOpen size={24}/>} label="Học từ" />
              <MobileNavBtn active={activeTab === 'quiz'} onClick={() => setActiveTab('quiz')} icon={<BrainCircuit size={24}/>} label="Kiểm tra" />
              <MobileNavBtn active={activeTab === 'manage'} onClick={() => setActiveTab('manage')} icon={<List size={24}/>} label="Quản lý" />
              <MobileNavBtn active={activeTab === 'profile'} onClick={() => setActiveTab('profile')} icon={<User size={24}/>} label="Tài khoản" />
            </nav>
          </div>
        </div>
      );
    }

    const MobileNavBtn = React.memo(({ active, onClick, icon, label }) => (
      <button 
        onClick={onClick} 
        className={`flex-1 h-full flex flex-col items-center justify-center gap-1.5 transition-colors active:scale-95 touch-manipulation
          ${active ? 'text-indigo-600 font-bold' : 'text-slate-400 font-medium hover:text-slate-600'}`}
      >
        <div className={`transition-transform duration-200 ${active ? '-translate-y-1' : ''}`}>{icon}</div>
        <span className="text-[10px] tracking-wide">{label}</span>
      </button>
    ));

    // --- Component: Giao diện Tài khoản (Bao gồm Két sắt API Key) ---
    const ProfileMode = React.memo(({ user, wordsCount, onLogout }) => {
      const [apiKeyInput, setApiKeyInput] = useState(localStorage.getItem('gemini_api_key') || '');
      const [isSaved, setIsSaved] = useState(!!localStorage.getItem('gemini_api_key'));

      const saveKey = () => {
        if(apiKeyInput.trim() === '') return alert('Vui lòng nhập API Key!');
        localStorage.setItem('gemini_api_key', apiKeyInput.trim());
        setIsSaved(true);
        alert('Đã lưu API Key an toàn vào bộ nhớ máy!');
      };

      const clearKey = () => {
        if(window.confirm('Xóa API Key khỏi máy này?')) {
          localStorage.removeItem('gemini_api_key');
          setApiKeyInput('');
          setIsSaved(false);
        }
      };

      if (!user) return null;
      const shortId = user.uid.substring(0, 8).toUpperCase();

      return (
        <div className="space-y-6 animate-in fade-in slide-in-from-bottom-4">
          <div className="bg-white p-6 rounded-3xl shadow-sm border border-slate-100 flex flex-col items-center text-center">
            <div className="w-24 h-24 bg-gradient-to-br from-indigo-500 to-purple-600 rounded-full flex items-center justify-center text-white text-3xl font-black mb-4 shadow-lg shadow-indigo-200">
              {shortId.charAt(0)}
            </div>
            <h2 className="text-xl font-black text-slate-800 mb-1">{user.isAnonymous ? 'Học viên Ẩn danh' : 'Thành viên'}</h2>
            <p className="text-sm font-mono text-slate-500 bg-slate-100 px-3 py-1 rounded-lg">ID: {shortId}</p>
            <div className="mt-6 flex items-center gap-2 text-sm text-green-600 font-bold bg-green-50 px-4 py-2 rounded-xl">
              <ShieldCheck size={18} /> Không gian dữ liệu Firebase
            </div>
          </div>

          <div className="grid grid-cols-2 gap-4">
            <div className="bg-white p-5 rounded-3xl shadow-sm border border-slate-100 flex flex-col items-center text-center">
              <span className="text-4xl font-black text-indigo-600 mb-1">{wordsCount}</span>
              <span className="text-xs font-bold text-slate-400 uppercase tracking-widest">Từ vựng</span>
            </div>
            <div className="bg-white p-5 rounded-3xl shadow-sm border border-slate-100 flex flex-col items-center text-center">
              <span className="text-4xl font-black text-pink-500 mb-1"><Cloud size={32} className="inline"/></span>
              <span className="text-xs font-bold text-slate-400 uppercase tracking-widest">Đám mây</span>
            </div>
          </div>

          {/* Khu vực két sắt API Key */}
          <div className="bg-white p-5 rounded-3xl shadow-sm border border-slate-100">
            <h3 className="text-sm font-bold text-slate-800 mb-2 uppercase tracking-wider flex items-center gap-2">
              <Key size={18} className="text-amber-500" /> API Key (Google AI)
            </h3>
            <p className="text-xs text-slate-500 mb-4 font-medium leading-relaxed">
              Mã API được lưu offline trên trình duyệt của bạn, đảm bảo bảo mật 100%.
            </p>
            <div className="flex flex-col gap-3">
              <input type="password" placeholder="Nhập API Key vào đây..." value={apiKeyInput} onChange={(e) => { setApiKeyInput(e.target.value); setIsSaved(false); }} className="w-full bg-slate-50 px-4 py-3 rounded-2xl text-sm border-none outline-none focus:ring-2 focus:ring-indigo-500 font-medium" />
              <div className="flex gap-2">
                <button onClick={saveKey} className={`flex-1 text-white font-bold py-3 rounded-2xl active:scale-95 transition-all text-sm shadow-md ${isSaved ? 'bg-green-500 shadow-green-500/30' : 'bg-indigo-600 shadow-indigo-600/30'}`}>
                  {isSaved ? '✅ Đã lưu Key' : 'Lưu Key'}
                </button>
                {isSaved && <button onClick={clearKey} className="px-5 bg-red-50 hover:bg-red-100 text-red-600 font-bold py-3 rounded-2xl active:scale-95 transition-all text-sm">Xóa</button>}
              </div>
            </div>
          </div>

          <div className="bg-white p-5 rounded-3xl shadow-sm border border-slate-100">
            <h3 className="text-sm font-bold text-slate-800 mb-3 uppercase tracking-wider">Phiên làm việc</h3>
            <button onClick={onLogout} className="w-full py-4 bg-slate-50 text-red-500 hover:bg-red-50 font-bold rounded-2xl active:scale-95 transition-all flex items-center justify-center gap-2 border border-slate-100">
              <LogOut size={20} /> Đăng xuất / Reset ID
            </button>
          </div>
        </div>
      );
    });

    // --- Component: Chế độ Học ---
    function StudyMode({ words, onAddSample }) {
      const [studyList, setStudyList] = useState([]);
      const [currentIndex, setCurrentIndex] = useState(0);
      
      const [micState, setMicState] = useState({ isRecording: false, supported: true, feedback: null });
      const [audioState, setAudioState] = useState({ isSpeaking: false, error: null });
      const [aiState, setAiState] = useState({ mnemonic: null, isGenerating: false });

      const recognitionRef = useRef(null);
      const audioRef = useRef(null);

      useEffect(() => {
        if (words?.length > 0) {
          if (studyList.length === 0 || studyList.length !== words.length) {
            setStudyList([...words].sort(() => 0.5 - Math.random()));
            setCurrentIndex(0);
          }
        } else { setStudyList([]); }
      }, [words]);

      const currentWord = studyList[currentIndex];

      useEffect(() => {
        if (audioRef.current) { audioRef.current.pause(); audioRef.current.src = ""; }
        if ('speechSynthesis' in window) window.speechSynthesis.cancel();
        setMicState(p => ({ ...p, feedback: null, isRecording: false }));
        setAudioState({ isSpeaking: false, error: null });
        setAiState({ mnemonic: null, isGenerating: false });
      }, [currentIndex]);

      useEffect(() => {
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        if (SpeechRecognition) {
          const recognition = new SpeechRecognition();
          recognition.continuous = false; recognition.lang = 'en-US'; recognition.interimResults = false;
          
          recognition.onresult = (e) => {
            const transcript = e.results[0][0].transcript.toLowerCase().replace(/[.,!?;:]/g, '').trim();
            const target = currentWord?.word.toLowerCase().replace(/[.,!?;:]/g, '').trim();
            const isCorrect = target && (transcript === target || transcript.includes(target));
            setMicState(p => ({ ...p, isRecording: false, feedback: { type: isCorrect ? 'success' : 'error', text: isCorrect ? `Đúng rồi: "${e.results[0][0].transcript}" 🎉` : `Bạn vừa đọc: "${e.results[0][0].transcript}"` } }));
          };
          recognition.onerror = (e) => setMicState(p => ({ ...p, isRecording: false, feedback: e.error !== 'aborted' ? { type: 'error', text: `Lỗi Micro (${e.error})` } : p.feedback }));
          recognition.onend = () => setMicState(p => ({ ...p, isRecording: false }));
          
          recognitionRef.current = recognition;
        } else setMicState(p => ({ ...p, supported: false }));
        
        return () => { if (recognitionRef.current) recognitionRef.current.abort(); };
      }, [currentWord]);

      const playAudio = async () => {
        if (audioState.isSpeaking || !currentWord) return;
        setAudioState({ isSpeaking: true, error: null });
        try {
          const audioUrl = await aiHelpers.generateAudio(currentWord.word);
          const audio = new Audio(audioUrl);
          audioRef.current = audio;
          audio.onended = () => setAudioState({ isSpeaking: false, error: null });
          audio.onerror = () => setAudioState({ isSpeaking: false, error: true });
          await audio.play();
        } catch (err) {
          // Fallback to offline speech synthesis
          if ('speechSynthesis' in window) {
            const u = new SpeechSynthesisUtterance(currentWord.word);
            u.lang = 'en-US'; u.rate = 0.85;
            u.onend = () => setAudioState({ isSpeaking: false, error: null });
            window.speechSynthesis.speak(u);
          } else { setAudioState({ isSpeaking: false, error: true }); }
        }
      };

      const generateMnemonic = async () => {
        if (!currentWord) return;
        setAiState({ mnemonic: null, isGenerating: true });
        try {
          const contextMsg = currentWord.context ? ` (Ngữ cảnh: ${currentWord.context})` : '';
          const prompt = `Bạn là chuyên gia. Tạo 1 mẹo ghi nhớ cực ngắn, vui nhộn bằng tiếng Việt cho từ "${currentWord.word}" (Nghĩa: ${currentWord.meaning})${contextMsg}. Chỉ trả lời mẹo.`;
          const text = await aiHelpers.generateText(prompt);
          setAiState({ mnemonic: text.trim(), isGenerating: false });
        } catch (e) { 
          if(e.message === "NO_API_KEY") setAiState({ mnemonic: "❌ Vui lòng vào tab Tài khoản để nhập API Key.", isGenerating: false });
          else setAiState({ mnemonic: "❌ Lỗi kết nối AI. Vui lòng thử lại sau.", isGenerating: false }); 
        }
      };

      const startRecording = (e) => {
        e.preventDefault(); if (!micState.supported) return;
        setMicState(p => ({ ...p, isRecording: true, feedback: null }));
        if (audioRef.current) audioRef.current.pause();
        if ('speechSynthesis' in window) window.speechSynthesis.cancel();
        try { recognitionRef.current.start(); } catch (e) {}
      };
      const stopRecording = (e) => { e.preventDefault(); if (recognitionRef.current && micState.isRecording) recognitionRef.current.stop(); };

      if (!studyList || studyList.length === 0) return (
        <div className="h-full flex flex-col items-center justify-center text-center p-8 animate-in zoom-in-95">
          <div className="w-24 h-24 bg-indigo-50 rounded-full flex items-center justify-center mb-6 text-indigo-300"><Cloud size={48} /></div>
          <h2 className="text-xl font-bold text-slate-800 mb-2">Kho từ vựng trống</h2>
          <p className="text-slate-500 mb-8 font-medium">Lưu trữ an toàn trên Đám mây. Thêm từ mới ngay!</p>
          <button onClick={onAddSample} className="w-full py-4 bg-indigo-600 text-white font-bold rounded-2xl active:scale-95 transition-transform flex items-center justify-center gap-2 shadow-lg shadow-indigo-600/30">
            <Wand2 size={20} /> Tải bộ từ mẫu
          </button>
        </div>
      );

      return (
        <div className="h-full flex flex-col space-y-4">
          <div className="flex justify-between items-center px-1 shrink-0">
            <span className="text-sm font-bold text-slate-400 bg-slate-200/50 px-3 py-1 rounded-full">{currentIndex + 1} / {studyList.length}</span>
            <button onClick={() => { setStudyList([...words].sort(() => 0.5 - Math.random())); setCurrentIndex(0); }} className="text-xs font-bold text-indigo-600 bg-indigo-100 px-3 py-1.5 rounded-full flex items-center gap-1 active:scale-95">
              <RotateCcw size={14} /> Trộn thẻ
            </button>
          </div>

          <div className="flex-1 bg-white rounded-3xl shadow-lg border border-slate-100 overflow-hidden relative flex flex-col min-h-0">
            <div className="h-1 bg-slate-100 w-full shrink-0"><div className="h-full bg-indigo-500 transition-all duration-300" style={{ width: `${((currentIndex + 1) / studyList.length) * 100}%` }}/></div>
            <div className="p-4 md:p-6 flex-1 flex flex-col min-h-0">
              
              <div className="shrink-0 flex flex-col items-center justify-center text-center mt-2 mb-4">
                <h2 className="text-4xl font-extrabold text-slate-800 mb-2 break-all">{currentWord.word}</h2>
                <div className="flex items-center gap-3">
                  <span className="text-lg text-indigo-500 font-medium font-mono bg-indigo-50 px-3 py-1 rounded-xl">{currentWord.phonetic}</span>
                  <button onClick={playAudio} disabled={audioState.isSpeaking} className={`p-2.5 rounded-full transition-all active:scale-90 ${audioState.isSpeaking ? 'bg-indigo-100 text-indigo-600' : 'bg-slate-100 text-slate-600 shadow-sm'}`}>
                    {audioState.isSpeaking ? <Loader2 size={20} className="animate-spin" /> : <Volume2 size={20} />}
                  </button>
                </div>
              </div>

              <div className="flex-1 w-full bg-slate-50/50 rounded-2xl p-4 text-left border border-slate-100/50 overflow-y-auto mb-4">
                <div className="mb-3">
                  <span className="text-[10px] font-bold text-slate-400 uppercase tracking-widest block mb-1">Nghĩa</span>
                  <p className="text-lg font-medium text-slate-700">
                    {currentWord.meaning} 
                    {currentWord.context && <span className="ml-2 text-[10px] font-bold bg-amber-100 text-amber-700 px-2 py-0.5 rounded-md align-middle"><Tag size={10} className="inline mr-1"/>{currentWord.context}</span>}
                  </p>
                </div>
                <div><span className="text-[10px] font-bold text-slate-400 uppercase tracking-widest block mb-1">Ví dụ</span><p className="text-sm text-slate-600 italic">"{currentWord.example}"</p></div>

                <div className="mt-4">
                  {!aiState.mnemonic && !aiState.isGenerating && (
                    <button onClick={generateMnemonic} className="w-full py-2.5 bg-gradient-to-r from-amber-100 to-orange-100 hover:from-amber-200 text-amber-700 font-bold rounded-xl text-[11px] uppercase tracking-wider flex justify-center items-center gap-1.5 active:scale-95 shadow-sm">
                      ✨ Tạo mẹo ghi nhớ bằng AI
                    </button>
                  )}
                  {aiState.isGenerating && <div className="w-full py-2.5 bg-amber-50 text-amber-600 font-bold rounded-xl text-[11px] uppercase flex justify-center gap-2"><Loader2 size={16} className="animate-spin" /> Suy nghĩ...</div>}
                  {aiState.mnemonic && (
                    <div className="bg-amber-50 rounded-xl p-4 border border-amber-200 animate-in fade-in">
                      <span className="text-[10px] font-black text-amber-500 uppercase flex gap-1 mb-1">✨ Mẹo AI</span>
                      <p className="text-[13px] text-amber-900 font-medium" dangerouslySetInnerHTML={{ __html: aiState.mnemonic.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>') }}></p>
                    </div>
                  )}
                </div>
              </div>

              <div className="shrink-0 w-full flex flex-col gap-3">
                <button onMouseDown={startRecording} onMouseUp={stopRecording} onMouseLeave={stopRecording} onTouchStart={startRecording} onTouchEnd={stopRecording} onTouchCancel={stopRecording} disabled={!micState.supported} 
                  className={`w-full py-3.5 rounded-2xl flex justify-center items-center gap-2 font-bold transition-all shadow-lg active:scale-95 select-none touch-none
                    ${micState.isRecording ? 'bg-red-500 text-white shadow-red-500/30' : 'bg-indigo-600 text-white shadow-indigo-600/30'} ${!micState.supported && 'opacity-50'}`}>
                  <Mic size={22} className={micState.isRecording ? 'animate-bounce' : ''} /> {micState.isRecording ? 'Đang nghe...' : 'Giữ để đọc kiểm tra'}
                </button>
                {micState.feedback && (
                  <div className={`p-3 rounded-xl flex items-center gap-2 text-sm animate-in zoom-in-95 ${micState.feedback.type === 'success' ? 'bg-green-100 text-green-800' : 'bg-red-100 text-red-800'}`}>
                    {micState.feedback.type === 'success' ? <CheckCircle2 size={18} className="shrink-0"/> : <XCircle size={18} className="shrink-0"/>} <p className="font-semibold">{micState.feedback.text}</p>
                  </div>
                )}
              </div>
            </div>
          </div>

          <div className="flex gap-3 shrink-0">
            <button onClick={() => setCurrentIndex(p => p - 1)} disabled={currentIndex === 0} className="flex-1 py-3.5 bg-white shadow-sm border border-slate-200 rounded-2xl font-bold text-slate-600 active:scale-95 disabled:opacity-50 flex items-center justify-center gap-1"><ChevronLeft size={20} /> Trước</button>
            <button onClick={() => setCurrentIndex(p => p + 1)} disabled={currentIndex === studyList.length - 1} className="flex-1 py-3.5 bg-white shadow-sm border border-slate-200 rounded-2xl font-bold text-slate-600 active:scale-95 disabled:opacity-50 flex items-center justify-center gap-1">Tiếp <ChevronRight size={20} /></button>
          </div>
        </div>
      );
    }

    // --- Component: Quiz & Story ---
    function QuizMode({ words }) {
      const [quizState, setQuizState] = useState('start');
      const [questions, setQuestions] = useState([]);
      const [currentQ, setCurrentQ] = useState(0);
      const [score, setScore] = useState(0);
      const [selectedOpt, setSelectedOpt] = useState(null);
      
      const [storyState, setStoryState] = useState({ content: null, isGenerating: false });

      const startQuiz = (num) => {
        if (words.length < 4) return alert("Cần tối thiểu 4 từ vựng!");
        const shuffled = [...words].sort(() => 0.5 - Math.random()).slice(0, Math.min(num, words.length));
        setQuestions(shuffled.map(target => {
          const wrongs = words.filter(w => w.id !== target.id).sort(() => 0.5 - Math.random()).slice(0, 3).map(w => w.meaning);
          return { ...target, options: [...wrongs, target.meaning].sort(() => 0.5 - Math.random()), answer: target.meaning };
        }));
        setScore(0); setCurrentQ(0); setSelectedOpt(null); setQuizState('playing');
      };

      const handleAnswer = (opt) => {
        if (selectedOpt) return;
        setSelectedOpt(opt);
        if (opt === questions[currentQ].answer) setScore(s => s + 1);
      };

      const generateStory = async () => {
        if (words.length < 5) return alert("Cần ít nhất 5 từ!");
        setQuizState('story'); setStoryState({ content: null, isGenerating: true });
        
        const wordStr = [...words].sort(() => 0.5 - Math.random()).slice(0, 8).map(w => w.word).join(', ');
        const prompt = `Viết 1 đoạn văn tiếng Việt siêu ngắn (tối đa 150 chữ) chêm chính xác các từ tiếng Anh sau: ${wordStr}. In đậm các từ tiếng Anh (VD: **Invest**). KHÔNG in đậm từ tiếng Việt. Nội dung mở rộng, tự do, gần gũi với đời sống.`;
        
        try {
          const text = await aiHelpers.generateText(prompt);
          setStoryState({ content: text, isGenerating: false });
        } catch (e) { 
          if(e.message === "NO_API_KEY") setStoryState({ content: "❌ Vui lòng vào tab Tài khoản nhập API Key để tạo truyện.", isGenerating: false });
          else setStoryState({ content: "❌ Lỗi sinh truyện AI. Vui lòng thử lại sau.", isGenerating: false }); 
        }
      };

      const parsedStory = useMemo(() => {
        if (!storyState.content) return null;
        return storyState.content.split(/(\*\*.*?\*\*|\n)/g).map((part, i) => {
          if (part === '\n') return <br key={i} />;
          if (part.startsWith('**') && part.endsWith('**')) {
            const clean = part.slice(2, -2).trim();
            const match = words.find(w => clean.toLowerCase().includes(w.word.toLowerCase()) || w.word.toLowerCase().includes(clean.toLowerCase()));
            return <TooltipWord key={i} word={clean} meaning={match ? match.meaning : '...'} />;
          }
          return <span key={i}>{part}</span>;
        });
      }, [storyState.content, words]);

      if (quizState === 'start') return (
        <div className="h-full flex flex-col justify-center p-4">
          <div className="bg-white rounded-3xl p-8 text-center w-full max-w-sm mx-auto shadow-sm border border-slate-100">
            <div className="w-20 h-20 bg-indigo-50 rounded-full flex justify-center items-center mx-auto mb-6 text-indigo-500"><BrainCircuit size={40}/></div>
            <h2 className="text-2xl font-black mb-2">Mini Test & AI</h2>
            <p className="text-slate-500 text-sm mb-8 font-medium">Ôn tập nhanh hoặc đọc truyện</p>
            <div className="flex flex-col gap-3">
              <button onClick={() => startQuiz(5)} className="w-full py-3.5 bg-indigo-600 text-white font-bold rounded-2xl active:scale-95 shadow-lg shadow-indigo-600/30">Test nhanh (5)</button>
              <button onClick={() => startQuiz(10)} className="w-full py-3.5 bg-white border-2 border-indigo-100 text-indigo-600 font-bold rounded-2xl active:scale-95">Thử thách (10)</button>
              <div className="h-px bg-slate-100 my-2"></div>
              <button onClick={generateStory} className="w-full py-3.5 bg-gradient-to-r from-pink-500 to-rose-500 text-white font-bold rounded-2xl active:scale-95 shadow-lg shadow-pink-500/30 flex justify-center items-center gap-2">✨ Truyện chêm AI</button>
            </div>
            {words.length < 5 && <p className="text-red-500 text-xs mt-4 font-bold bg-red-50 p-2 rounded-lg">Cần lưu tối thiểu 5 từ</p>}
          </div>
        </div>
      );

      if (quizState === 'story') return (
        <div className="h-full flex flex-col p-2 animate-in zoom-in-95">
          <div className="bg-white rounded-3xl shadow-sm border border-slate-100 p-6 flex-1 flex flex-col min-h-0">
            <h2 className="text-xl font-black text-slate-800 mb-2 flex items-center gap-2 shrink-0"><Wand2 className="text-pink-500"/> Chuyện AI</h2>
            <p className="text-xs text-slate-400 font-medium mb-4 shrink-0">* Chạm/di chuột vào từ in đỏ để xem nghĩa.</p>
            <div className="flex-1 overflow-y-auto bg-slate-50 rounded-2xl p-5 border border-slate-100 shadow-inner text-slate-700 leading-relaxed text-[16px] font-medium">
              {storyState.isGenerating ? <div className="h-full flex flex-col justify-center items-center text-pink-500 gap-3"><Loader2 size={32} className="animate-spin" /><p className="text-sm font-bold">Đang sáng tác...</p></div> : <div>{parsedStory}</div>}
            </div>
            <button onClick={() => setQuizState('start')} className="mt-5 w-full shrink-0 py-3.5 bg-slate-100 text-slate-700 font-bold rounded-2xl active:scale-95 flex justify-center items-center gap-2"><RotateCcw size={18} /> Quay lại</button>
          </div>
        </div>
      );

      if (quizState === 'playing' && questions.length > 0) {
        const q = questions[currentQ];
        return (
          <div className="h-full flex flex-col">
            <div className="flex justify-between items-center mb-3 text-sm font-bold text-slate-500"><span>Câu {currentQ + 1}/{questions.length}</span><span className="bg-indigo-100 text-indigo-700 px-3 py-1 rounded-full">Điểm: {score}</span></div>
            <div className="h-1.5 bg-slate-200 rounded-full mb-6 overflow-hidden shrink-0"><div className="h-full bg-indigo-500 transition-all duration-300" style={{ width: `${((currentQ + 1) / questions.length) * 100}%` }}></div></div>
            
            <div className="bg-white rounded-3xl p-8 text-center mb-6 shrink-0 shadow-sm border border-slate-100">
              <p className="text-xs font-bold text-slate-400 mb-2 uppercase">Nghĩa của từ này?</p>
              <h2 className="text-4xl font-black text-slate-800 mb-3">{q.word}</h2>
              <span className="text-sm text-indigo-500 font-mono bg-indigo-50 px-3 py-1 rounded-lg">{q.phonetic}</span>
            </div>

            <div className="flex-1 overflow-y-auto min-h-0"><div className="grid grid-cols-1 gap-3 pb-2">
              {q.options.map((opt, idx) => {
                let cls = "bg-white border-2 border-slate-100 text-slate-700"; let icon = null;
                if (selectedOpt) {
                  if (opt === q.answer) { cls = "bg-green-50 border-green-500 text-green-800"; icon = <CheckCircle2 size={20} className="text-green-600"/>; }
                  else if (opt === selectedOpt) { cls = "bg-red-50 border-red-500 text-red-800"; icon = <XCircle size={20} className="text-red-600"/>; }
                  else cls = "bg-white border-slate-50 text-slate-300 opacity-50";
                }
                return <button key={idx} onClick={() => handleAnswer(opt)} disabled={!!selectedOpt} className={`w-full p-4 rounded-2xl text-left font-bold text-[15px] flex items-center justify-between active:scale-[0.98] ${cls}`}><span>{opt}</span>{icon}</button>;
              })}
            </div></div>

            {selectedOpt && (
              <div className="mt-4 pb-2 shrink-0"><button onClick={() => { if (currentQ < questions.length - 1) { setCurrentQ(currentQ + 1); setSelectedOpt(null); } else setQuizState('result'); }} className="w-full py-4 bg-indigo-600 text-white font-bold rounded-2xl shadow-lg shadow-indigo-600/30 active:scale-95 flex justify-center items-center gap-2">{currentQ < questions.length - 1 ? 'Tiếp theo' : 'Xem kết quả'} <ChevronRight size={20} /></button></div>
            )}
          </div>
        );
      }

      return (
        <div className="h-full flex flex-col justify-center p-4 animate-in zoom-in-95">
          <div className="bg-white rounded-3xl p-8 text-center w-full max-w-sm mx-auto shadow-sm border border-slate-100">
            <div className="w-24 h-24 bg-yellow-50 rounded-full flex justify-center items-center mx-auto mb-6 text-yellow-500"><Trophy size={48} /></div>
            <h2 className="text-2xl font-black mb-2">Hoàn Thành!</h2>
            <div className="text-6xl font-black text-indigo-600 mb-8 mt-4">{score} <span className="text-2xl text-slate-300">/ {questions.length}</span></div>
            <button onClick={() => setQuizState('start')} className="w-full py-4 bg-slate-100 text-slate-700 font-bold rounded-2xl active:scale-95 flex justify-center items-center gap-2"><RotateCcw size={20} /> Làm lại</button>
          </div>
        </div>
      );
    }

    // --- Component: Quản lý từ vựng ---
    function ManageMode({ words, onAdd, onDelete, onAddSample }) {
      const [newWord, setNewWord] = useState({ word: '', context: '', phonetic: '', meaning: '', example: '' });
      const [aiState, setAiState] = useState({ isGenerating: false, error: null });

      const generateWordInfo = async () => {
        if (!newWord.word.trim()) return setAiState({ error: "Vui lòng nhập từ tiếng Anh trước.", isGenerating: false });
        setAiState({ error: null, isGenerating: true });
        try {
          const contextInstruction = newWord.context.trim() 
            ? `Lưu ý: Hãy giải thích nghĩa và đặt câu ví dụ trong ngữ cảnh / chuyên ngành "${newWord.context.trim()}".` 
            : `Sử dụng nghĩa thông dụng và phổ biến nhất.`;

          const prompt = `Trình bày IPA, nghĩa Tiếng Việt, và 1 câu ví dụ tiếng Anh cực kỳ đơn giản, ngắn gọn cho từ: "${newWord.word}". 
          ${contextInstruction}
          Chỉ trả JSON chính xác với các key: phonetic, meaning, example.`;
          
          const text = await aiHelpers.generateText(prompt, true);
          const info = JSON.parse(text || "{}");
          
          if (info.meaning) {
            setNewWord(p => ({ ...p, phonetic: info.phonetic || '', meaning: info.meaning || '', example: info.example || '' }));
          } else {
            throw new Error("Format error");
          }
        } catch (e) { 
          if(e.message === "NO_API_KEY") setAiState({ error: "Thiếu khóa bảo mật. Hãy nhập API Key trong tab Tài khoản.", isGenerating: false });
          else setAiState({ error: "Lỗi AI. Vui lòng nhập thủ công hoặc thử lại sau.", isGenerating: false }); 
        } finally { 
          setAiState(p => ({ ...p, isGenerating: false })); 
        }
      };

      const handleAdd = (e) => {
        e.preventDefault();
        if (!newWord.word || !newWord.meaning) return setAiState({ error: "Vui lòng điền đủ Từ vựng và Nghĩa" });
        
        onAdd({ 
          word: newWord.word.trim(), 
          context: newWord.context.trim(), 
          phonetic: newWord.phonetic.trim(), 
          meaning: newWord.meaning.trim(), 
          example: newWord.example.trim() 
        });
        
        setNewWord({ word: '', context: '', phonetic: '', meaning: '', example: '' }); 
        setAiState({ error: null });
      };

      return (
        <div className="space-y-6 h-full flex flex-col">
          <div className="bg-white p-5 rounded-3xl shadow-sm border border-slate-100 shrink-0">
            <h2 className="text-lg font-black mb-4 flex items-center gap-2 text-indigo-700"><Plus size={20} /> Thêm từ mới</h2>
            {aiState.error && <div className="mb-3 p-2 bg-red-50 text-red-600 rounded-xl text-xs font-bold flex gap-2"><AlertCircle size={16}/>{aiState.error}</div>}
            <form onSubmit={handleAdd} className="space-y-3">
              
              <div className="flex gap-2">
                <input type="text" required placeholder="Từ tiếng Anh..." value={newWord.word} onChange={e => setNewWord({...newWord, word: e.target.value})} className="flex-1 bg-slate-50 px-4 py-3 rounded-2xl text-sm font-bold border-none outline-none focus:ring-2 focus:ring-indigo-500" />
                <button type="button" onClick={generateWordInfo} disabled={aiState.isGenerating || !newWord.word} className="bg-indigo-100 text-indigo-700 px-4 rounded-2xl font-bold active:scale-95 transition-transform flex items-center justify-center min-w-[50px]">
                  {aiState.isGenerating ? <Loader2 className="animate-spin" size={20} /> : <Wand2 size={20} />}
                </button>
              </div>

              <div className="relative">
                <div className="absolute inset-y-0 left-4 flex items-center pointer-events-none">
                  <Tag size={16} className="text-slate-400" />
                </div>
                <input 
                  type="text" 
                  placeholder="Ngữ cảnh / Chuyên ngành (Tùy chọn)" 
                  value={newWord.context} 
                  onChange={e => setNewWord({...newWord, context: e.target.value})} 
                  className="w-full bg-slate-50 pl-11 pr-4 py-3 rounded-2xl text-[13px] font-medium outline-none focus:ring-2 focus:ring-indigo-500 placeholder-slate-400" 
                />
              </div>

              <div className="flex gap-2">
                <input type="text" required placeholder="Nghĩa Tiếng Việt" value={newWord.meaning} onChange={e => setNewWord({...newWord, meaning: e.target.value})} className="flex-[2] bg-slate-50 px-4 py-3 rounded-2xl text-sm font-medium outline-none focus:ring-2 focus:ring-indigo-500" />
                <input type="text" placeholder="Phiên âm" value={newWord.phonetic} onChange={e => setNewWord({...newWord, phonetic: e.target.value})} className="flex-1 bg-slate-50 px-4 py-3 rounded-2xl text-sm font-medium outline-none focus:ring-2 focus:ring-indigo-500 min-w-0" />
              </div>
              
              <textarea placeholder="Câu ví dụ..." value={newWord.example} onChange={e => setNewWord({...newWord, example: e.target.value})} className="w-full bg-slate-50 px-4 py-3 rounded-2xl text-sm font-medium outline-none focus:ring-2 focus:ring-indigo-500 resize-none h-16"></textarea>
              <button type="submit" className="w-full bg-indigo-600 text-white font-bold py-3.5 rounded-2xl mt-2 active:scale-95 flex items-center justify-center gap-2 transition-transform shadow-lg shadow-indigo-600/30"><Cloud size={18} /> Lưu lên Đám mây</button>
            </form>
          </div>

          <div className="bg-white p-5 rounded-3xl shadow-sm border border-slate-100 flex-1 flex flex-col min-h-0">
            <div className="flex justify-between mb-4 shrink-0"><h2 className="text-lg font-black flex items-center text-slate-800">Từ của bạn <span className="ml-2 text-xs bg-indigo-100 text-indigo-700 px-2 py-1 rounded-full">{words.length}</span></h2></div>
            <div className="flex-1 overflow-y-auto min-h-0 pb-4">
              {words.length === 0 ? (
                 <div className="text-center py-6"><p className="text-slate-400 text-sm mb-4 font-medium">Danh sách trống.</p><button onClick={onAddSample} className="text-indigo-600 bg-indigo-50 px-4 py-2 rounded-xl text-sm font-bold flex justify-center gap-2 mx-auto"><Wand2 size={16}/> Tải từ mẫu</button></div>
              ) : (
                <div className="space-y-3">
                  {words.map((w) => (
                    <div key={w.id} className="p-4 bg-slate-50 rounded-2xl flex items-center justify-between gap-3">
                      <div className="flex-1 overflow-hidden">
                        <h3 className="font-bold truncate text-slate-800">
                          {w.word} <span className="text-xs text-indigo-500 font-mono ml-1">{w.phonetic}</span>
                        </h3>
                        <p className="text-sm font-medium text-slate-600 truncate mt-1">
                          {w.meaning}
                          {w.context && <span className="ml-2 text-[10px] font-bold bg-amber-100 text-amber-700 px-2 py-0.5 rounded-md align-middle"><Tag size={10} className="inline mr-1"/>{w.context}</span>}
                        </p>
                      </div>
                      <button onClick={() => { if(window.confirm("Xóa từ này?")) onDelete(w.id) }} className="p-2 text-slate-300 hover:text-red-500 active:bg-red-50 rounded-xl shrink-0 transition-colors"><Trash2 size={20}/></button>
                    </div>
                  ))}
                </div>
              )}
            </div>
          </div>
        </div>
      );
    }

    const root = createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
